<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MDM Riemannian Classifier</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #020d04; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="850" height="270"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 850, H = 270;

const A = 0.09, B = 1.10, SX = 7.0, SY = 3.8;

function surfacePoint(u, v) {
  const x = (u - 0.5) * SX, y = (v - 0.5) * SY;
  return [x, y, A * (x*x + B*y*y)];
}

const FOV = 580, CX = W*0.50, CY = H*0.62;
const TILT = 0.30, cosT = Math.cos(TILT), sinT = Math.sin(TILT);

function project([x, y, z]) {
  const ry = y*cosT - z*sinT, rz = y*sinT + z*cosT;
  const dist = ry + 5.8;
  return [CX + (x/dist)*FOV, CY - (rz/dist)*FOV, dist];
}

function buildGrid() {
  const nu=46, nv=32, du=1/nu, dv=1/nv, cells=[];
  for (let i=0;i<nu;i++) for (let j=0;j<nv;j++) {
    const u=i*du, v=j*dv;
    const pts=[surfacePoint(u,v),surfacePoint(u+du,v),surfacePoint(u+du,v+dv),surfacePoint(u,v+dv)];
    const mc=pts.reduce((a,p)=>[a[0]+p[0]/4,a[1]+p[1]/4,a[2]+p[2]/4],[0,0,0]);
    cells.push({pts, dist:project(mc)[2]});
  }
  return cells.sort((a,b)=>b.dist-a.dist);
}
const grid = buildGrid();

function drawManifold() {
  grid.forEach(({pts}) => {
    const pr=pts.map(p=>project(p));
    ctx.beginPath(); ctx.moveTo(pr[0][0],pr[0][1]);
    pr.forEach(([px,py])=>ctx.lineTo(px,py));
    ctx.closePath();
    ctx.fillStyle='rgba(14,40,17,0.09)'; ctx.fill();
    ctx.strokeStyle='rgba(210,35,42,0.19)'; ctx.lineWidth=0.5; ctx.stroke();
  });
}

// ── Geodesic ODE RK4 ─────────────────────────────────────
function accel(u, v, du, dv) {
  const x=(u-0.5)*SX, y=(v-0.5)*SY;
  const zu=2*A*x*SX, zv=2*A*B*y*SY;
  const zuu=2*A*SX*SX, zvv=2*A*B*SY*SY;
  const g11=1+zu*zu, g12=zu*zv, g22=1+zv*zv;
  const det=g11*g22-g12*g12;
  const G11=g22/det, G12=-g12/det, G22=g11/det;
  return [
    -(G11*zu*zuu+G12*zv*zuu)*du*du-(G11*zu*zvv+G12*zv*zvv)*dv*dv,
    -(G12*zu*zuu+G22*zv*zuu)*du*du-(G12*zu*zvv+G22*zv*zvv)*dv*dv
  ];
}

function geodesicRK4(u0, v0, du0, dv0, steps, ds) {
  let u=u0, v=v0, du=du0, dv=dv0;
  const pts=[[u,v]];
  for (let i=0;i<steps;i++) {
    const [a1u,a1v]=accel(u,v,du,dv);
    const [a2u,a2v]=accel(u+du*ds/2,v+dv*ds/2,du+a1u*ds/2,dv+a1v*ds/2);
    const [a3u,a3v]=accel(u+du*ds/2,v+dv*ds/2,du+a2u*ds/2,dv+a2v*ds/2);
    const [a4u,a4v]=accel(u+du*ds,  v+dv*ds,  du+a3u*ds,  dv+a3v*ds);
    u+=ds*du; v+=ds*dv;
    du+=ds*(a1u+2*a2u+2*a3u+a4u)/6;
    dv+=ds*(a1v+2*a2v+2*a3v+a4v)/6;
    const x=(u-0.5)*SX, y=(v-0.5)*SY;
    const zu=2*A*x*SX, zv=2*A*B*y*SY;
    const g11=1+zu*zu, g12=zu*zv, g22=1+zv*zv;
    const sp=Math.sqrt(g11*du*du+2*g12*du*dv+g22*dv*dv)||1;
    du/=sp; dv/=sp;
    pts.push([u,v]);
  }
  return pts;
}

function normalizeDir(u, v, du, dv) {
  const x=(u-0.5)*SX, y=(v-0.5)*SY;
  const zu=2*A*x*SX, zv=2*A*B*y*SY;
  const g11=1+zu*zu, g12=zu*zv, g22=1+zv*zv;
  const sp=Math.sqrt(g11*du*du+2*g12*du*dv+g22*dv*dv)||1;
  return [du/sp, dv/sp];
}

// Arc: geodesic circle of given radius (steps*ds) around center, over angular span
function geodesicCircleArc(uc, vc, centerAngle, arcSpan, steps, ds, nRays) {
  const pts3d=[];
  for (let i=0;i<=nRays;i++) {
    const angle=centerAngle - arcSpan/2 + arcSpan*(i/nRays);
    let [du,dv]=normalizeDir(uc,vc,Math.cos(angle),Math.sin(angle));
    const geo=geodesicRK4(uc,vc,du,dv,steps,ds);
    const [uf,vf]=geo[geo.length-1];
    const p=surfacePoint(uf,vf);
    pts3d.push([p[0],p[1],p[2]-0.020]);
  }
  return pts3d;
}

function drawArc(pts3d, r, g, b) {
  [[7, 0.06],[3.5, 0.18],[1.5, 0.90]].forEach(([lw,alpha])=>{
    ctx.beginPath();
    pts3d.forEach((p,i)=>{ const [px,py]=project(p); i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); });
    ctx.strokeStyle=`rgba(${r},${g},${b},${alpha})`;
    ctx.lineWidth=lw; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
  });
}

// ── Seeded RNG + Gaussian ─────────────────────────────────
function makeRng(seed) {
  let s=seed>>>0;
  return ()=>{ s=(Math.imul(1664525,s)+1013904223)>>>0; return s/4294967295; };
}
function boxMuller(rng) {
  return Math.sqrt(-2*Math.log(rng()+1e-10))*Math.cos(2*Math.PI*rng());
}

// ── Barycenters closer together → more overlap ───────────
// Moved from 0.26/0.70 → 0.30/0.64 (closer), sigma increased
const UG=0.30, VG=0.47;
const UB=0.66, VB=0.51;
const sigU=0.095, sigV=0.088;

function makeCloud(uc, vc, n, seed) {
  const rng=makeRng(seed), pts=[];
  for (let i=0;i<n;i++) {
    const u=Math.max(0.04,Math.min(0.96, uc+boxMuller(rng)*sigU));
    const v=Math.max(0.06,Math.min(0.94, vc+boxMuller(rng)*sigV));
    pts.push([u,v]);
  }
  return pts;
}
const greenCloud=makeCloud(UG,VG,28,42);
const blueCloud =makeCloud(UB,VB,28,137);

function drawDot(u, v, r, cr, cg, cb) {
  const sp=surfacePoint(u,v); sp[2]-=0.028;
  const [px,py]=project(sp);
  ctx.beginPath(); ctx.arc(px,py,r*2.8,0,Math.PI*2);
  ctx.fillStyle=`rgba(${cr},${cg},${cb},0.10)`; ctx.fill();
  ctx.beginPath(); ctx.arc(px,py,r*1.5,0,Math.PI*2);
  ctx.fillStyle=`rgba(${cr},${cg},${cb},0.30)`; ctx.fill();
  ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2);
  ctx.fillStyle=`rgba(${cr},${cg},${cb},0.88)`; ctx.fill();
  ctx.beginPath(); ctx.arc(px-r*0.28,py-r*0.28,r*0.38,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.40)'; ctx.fill();
}

function drawBarycenter(u, v, cr, cg, cb) {
  const sp=surfacePoint(u,v); sp[2]-=0.044;
  const [px,py]=project(sp);
  [44,26,15].forEach((r,i)=>{
    ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${cr},${cg},${cb},${[0.05,0.12,0.24][i]})`; ctx.fill();
  });
  ctx.beginPath(); ctx.arc(px,py,7,0,Math.PI*2);
  ctx.fillStyle=`rgba(${cr},${cg},${cb},1)`; ctx.fill();
  ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.fill();
}

function drawBackground() {
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#020d04'); bg.addColorStop(0.5,'#041608'); bg.addColorStop(1,'#020d04');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  [{x:0.28,y:0.45},{x:0.72,y:0.45}].forEach(g=>{
    const gr=ctx.createRadialGradient(W*g.x,H*g.y,4,W*g.x,H*g.y,W*0.48);
    gr.addColorStop(0,'rgba(10,70,24,0.13)'); gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
  });
}

// ── Precompute arcs ───────────────────────────────────────
// Angle from green toward blue
const angleGB = Math.atan2(VB-VG, UB-UG);

// Arc radius increased (STEPS=28 vs 22) so the two arcs intersect
// Each arc spans 180° on the facing hemisphere
const STEPS=28, DS=0.013, NRAYS=42;

const greenArc=geodesicCircleArc(UG,VG, angleGB,        Math.PI, STEPS, DS, NRAYS);
const blueArc =geodesicCircleArc(UB,VB, angleGB+Math.PI, Math.PI, STEPS, DS, NRAYS);

// ── RENDER ────────────────────────────────────────────────
function render() {
  ctx.clearRect(0,0,W,H);
  drawBackground();
  drawManifold();

  // Arcs first (behind points)
  drawArc(greenArc, 55, 220, 95);
  drawArc(blueArc,  75, 155, 255);

  // Clouds
  greenCloud.forEach(([u,v])=>drawDot(u,v,3.2,55,215,90));
  blueCloud .forEach(([u,v])=>drawDot(u,v,3.2,75,150,255));

  // Barycenters on top
  drawBarycenter(UG,VG,60,225,100);
  drawBarycenter(UB,VB,80,165,255);
}

render();
</script>
</body>
</html>
